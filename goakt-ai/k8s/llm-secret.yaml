# Create this secret with your API keys before deploying.
# kubectl create secret generic llm-api-keys \
#   --from-literal=LLM_PROVIDER=openai \
#   --from-literal=OPENAI_API_KEY=sk-your-key-here
#
# Or apply this file after replacing the placeholder values.
apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
type: Opaque
stringData:
  LLM_PROVIDER: "openai"
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
  MISTRAL_API_KEY: ""

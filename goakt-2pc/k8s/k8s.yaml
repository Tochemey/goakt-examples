# RBAC for Kubernetes discovery
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: saga-transfer
rules:
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "get", "watch", "list" ]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: saga-transfer
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default
roleRef:
  kind: ClusterRole
  name: saga-transfer
  apiGroup: rbac.authorization.k8s.io
---
# StatefulSet for saga transfer service pods
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: saga-transfer
  labels:
    app.kubernetes.io/name: saga-transfer
    app.kubernetes.io/component: SagaTransferSystem
    app.kubernetes.io/part-of: Saga
spec:
  serviceName: saga-transfer
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app.kubernetes.io/name: saga-transfer
      app.kubernetes.io/component: SagaTransferSystem
      app.kubernetes.io/part-of: Saga
  template:
    metadata:
      labels:
        app.kubernetes.io/name: saga-transfer
        app.kubernetes.io/component: SagaTransferSystem
        app.kubernetes.io/part-of: Saga
    spec:
      restartPolicy: Always
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
      containers:
        - name: saga-transfer
          image: "saga-transfer:dev"
          imagePullPolicy: IfNotPresent
          command: [ "./saga-transfer", "run" ]
          ports:
            - containerPort: 50051
              name: http
              protocol: TCP
            - containerPort: 50052
              name: remoting-port
              protocol: TCP
            - containerPort: 3322
              name: discovery-port
              protocol: TCP
            - containerPort: 3320
              name: peers-port
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PORT
              value: "50051"
            - name: DISCOVERY_PORT
              value: "3322"
            - name: PEERS_PORT
              value: "3320"
            - name: REMOTING_PORT
              value: "50052"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: OTEL_SERVICE_NAME
              value: "saga-transfer"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: saga-transfer-http
  labels:
    app.kubernetes.io/name: saga-transfer
    app.kubernetes.io/component: SagaTransferSystem
    app.kubernetes.io/part-of: Saga
spec:
  selector:
    app.kubernetes.io/name: saga-transfer
    app.kubernetes.io/component: SagaTransferSystem
    app.kubernetes.io/part-of: Saga
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 50051
      targetPort: http
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: saga-transfer
  labels:
    app.kubernetes.io/name: saga-transfer
    app.kubernetes.io/component: SagaTransferSystem
    app.kubernetes.io/part-of: Saga
spec:
  selector:
    app.kubernetes.io/name: saga-transfer
    app.kubernetes.io/component: SagaTransferSystem
    app.kubernetes.io/part-of: Saga
  clusterIP: None
  ports:
    - protocol: TCP
      port: 50051
      targetPort: http
      name: http
    - protocol: TCP
      port: 50052
      targetPort: remoting-port
      name: remoting-port
    - protocol: TCP
      port: 3322
      targetPort: discovery-port
      name: discovery-port
    - protocol: TCP
      port: 3320
      targetPort: peers-port
      name: peers-port

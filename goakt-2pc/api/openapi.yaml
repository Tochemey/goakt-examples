openapi: 3.0.3
info:
  title: 2pc Money Transfer Service API
  description: HTTP API for the GoAkt 2pc-based money transfer service (Kubernetes discovery with persistence)
  version: 1.0.0

paths:
  /accounts:
    post:
      operationId: createAccount
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "200":
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "500":
          description: Internal server error

  /accounts/{accountId}:
    get:
      operationId: getAccount
      summary: Get an account by ID
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "404":
          description: Account not found
        "500":
          description: Internal server error

  /accounts/{accountId}/credit:
    post:
      operationId: creditAccount
      summary: Credit an account (direct credit, not via transfer)
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditAccountRequest"
      responses:
        "200":
          description: Account credited successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "404":
          description: Account not found
        "500":
          description: Internal server error

  /transfers:
    post:
      operationId: createTransfer
      summary: Initiate a 2pc-based money transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferRequest"
      responses:
        "200":
          description: Transfer completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponse"
        "400":
          description: Bad request (e.g. insufficient funds)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponse"
        "500":
          description: Internal server error

  /transfers/{transferId}:
    get:
      operationId: getTransfer
      summary: Get transfer status
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transfer status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferStatusResponse"
        "404":
          description: Transfer not found
        "500":
          description: Internal server error

components:
  schemas:
    Account:
      type: object
      required:
        - account_id
        - account_balance
      properties:
        account_id:
          type: string
          description: Unique account identifier
        account_balance:
          type: number
          format: double
          description: Current account balance

    CreateAccountRequest:
      type: object
      required:
        - create_account
      properties:
        create_account:
          type: object
          required:
            - account_id
            - account_balance
          properties:
            account_id:
              type: string
            account_balance:
              type: number
              format: double

    CreditAccountRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          format: double

    AccountResponse:
      type: object
      required:
        - account
      properties:
        account:
          $ref: "#/components/schemas/Account"

    CreateTransferRequest:
      type: object
      required:
        - transfer
      properties:
        transfer:
          type: object
          required:
            - from_account_id
            - to_account_id
            - amount
          properties:
            from_account_id:
              type: string
            to_account_id:
              type: string
            amount:
              type: number
              format: double

    TransferResponse:
      type: object
      required:
        - transfer
      properties:
        transfer:
          type: object
          required:
            - transfer_id
            - status
          properties:
            transfer_id:
              type: string
            status:
              type: string
              enum: [ completed, failed ]
            reason:
              type: string
              description: Error message when status is failed

    TransferStatusResponse:
      type: object
      required:
        - transfer
      properties:
        transfer:
          type: object
          required:
            - transfer_id
            - status
          properties:
            transfer_id:
              type: string
            status:
              type: string
              enum: [ pending, completed, failed, compensating, not_found ]
            reason:
              type: string

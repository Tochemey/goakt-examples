# PostgreSQL for DC-1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-dc1
  labels:
    app: postgres
    dc: dc-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      dc: dc-1
  template:
    metadata:
      labels:
        app: postgres
        dc: dc-1
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - accounts
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: init-script
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-dc1
  labels:
    app: postgres
    dc: dc-1
spec:
  selector:
    app: postgres
    dc: dc-1
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  clusterIP: None

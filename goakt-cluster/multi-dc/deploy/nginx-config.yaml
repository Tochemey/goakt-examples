# Nginx ConfigMap for HTTP load balancing — routes to both DCs
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {
      worker_connections 512;
    }
    http {
      sendfile on;
      tcp_nopush on;
      keepalive_timeout 15s;
      client_body_buffer_size 4k;
      client_max_body_size 1m;
      access_log off;
      error_log /var/log/nginx/error.log warn;

      upstream dc1_servers {
        server accounts-dc1-http:50051;
      }

      upstream dc2_servers {
        server accounts-dc2-http:50051;
      }

      server {
        listen 8080;

        # DC-1 routes
        location /dc1/ {
          rewrite ^/dc1/(.*) /$1 break;
          proxy_pass http://dc1_servers;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        # DC-2 routes
        location /dc2/ {
          rewrite ^/dc2/(.*) /$1 break;
          proxy_pass http://dc2_servers;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default: DC-1
        location / {
          proxy_pass http://dc1_servers;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }

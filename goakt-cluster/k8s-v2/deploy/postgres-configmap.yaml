# ConfigMap for PostgreSQL initialization script
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  labels:
    app: postgres
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS accounts
    (
        actor_id   VARCHAR(255) NOT NULL PRIMARY KEY,
        balance    NUMERIC(19, 2) NOT NULL,
        created_at TIMESTAMPTZ   NOT NULL DEFAULT NOW()
    );
